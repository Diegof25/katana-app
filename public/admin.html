<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Master Panel | Katana Barbershop</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/es.js"></script>
    <style>
        :root { 
            --accent: #ffb400; /**/
            --accent-dark: #cc9000;
            --bg: #0a0a0a; /* Fondo casi negro */
            --card: #111111; /* Tarjetas gris muy oscuro */
            --border: #252525; /* Bordes sutiles */
            --text-main: #e0e0e0;
            --text-muted: #707070;
            --font-heading: 'Oswald', sans-serif;
            --font-body: 'Roboto Mono', monospace; /* Fuente mono para toque técnico */
        }

        /* --- RESET Y BÁSICOS --- */
        * { box-sizing: border-box; }
        body { 
            background: var(--bg); 
            color: var(--text-main); 
            font-family: var(--font-body); 
            margin: 0; 
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        .admin-layout { display: flex; flex-direction: column; min-height: 100vh; }
        .admin-container { 
            max-width: 1200px; 
            width: 100%; 
            margin: 0 auto; 
            padding: 20px 15px; 
            flex-grow: 1; 
        }

        /* --- HEADER PREMIUM (Adaptable) --- */
        .header-admin { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: var(--card);
            border: 1px solid var(--border);
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .logo-admin h1 { 
            font-family: var(--font-heading); 
            font-size: 1.8rem; 
            margin: 0; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .logo-admin span { color: var(--accent); }
        .logo-admin p { color: var(--text-muted); font-size: 0.8rem; margin: 3px 0 0 0; }

        .header-actions { display: flex; align-items: center; gap: 15px; }
        .stats-badge { 
            background: rgba(255, 180, 0, 0.15); /* Color acorde al accent */
            color: var(--accent);
            padding: 6px 15px; 
            border-radius: 4px; 
            font-size: 0.8rem; 
            font-weight: bold;
            border: 1px solid rgba(255, 180, 0, 0.3);
        }

        .btn-exit {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.8rem;
            transition: 0.3s;
            display: flex; align-items: center; gap: 5px;
        }
        .btn-exit:hover { color: white; }

        @media (max-width: 600px) {
            .header-admin { flex-direction: column; text-align: center; gap: 15px; }
            .header-actions { width: 100%; justify-content: space-between; }
        }

        /* --- GRID PRINCIPAL (Adaptable) --- */
        .admin-grid { display: grid; grid-template-columns: 1fr 360px; gap: 25px; align-items: start; }
        
        @media (max-width: 992px) { .admin-grid { grid-template-columns: 1fr; } }

        /* --- TARJETAS PREMIUM (Cards) --- */
        .config-card { 
            background: var(--card); 
            padding: 25px; 
            border-radius: 8px; 
            border: 1px solid var(--border);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .config-card h3 { 
            color: white; 
            font-family: var(--font-heading);
            font-size: 1.1rem; 
            margin: 0 0 20px 0; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            display: flex; align-items: center; gap: 10px;
        }
        .config-card h3 i { color: var(--accent); }

        /* --- FORMULARIOS PREMIUM --- */
        .config-group { margin-bottom: 18px; }
        .config-group label { 
            display: block; 
            font-size: 0.75rem; 
            color: var(--text-muted); 
            margin-bottom: 6px; 
            text-transform: uppercase;
        }
        .config-group input, .config-group select { 
            width: 100%; 
            background: #1a1a1a; 
            border: 1px solid var(--border); 
            color: white; 
            padding: 12px 15px; 
            border-radius: 4px; 
            font-family: var(--font-body);
            font-size: 0.9rem;
            transition: 0.3s;
        }
        .config-group input:focus, .config-group select:focus {
            border-color: var(--accent);
            outline: none;
            background: #202020;
        }

        /* Días de atención */
        .days-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); gap: 8px; }
        .day-item { 
            font-size: 0.75rem; 
            display: flex; align-items: center; justify-content: center; gap: 4px; 
            background: #1a1a1a; padding: 10px; border-radius: 4px; border: 1px solid var(--border); cursor: pointer; 
            transition: 0.2s;
        }
        .day-item:hover { border-color: #444; }
        .day-item input { width: auto !important; margin: 0; cursor: pointer; accent-color: var(--accent); }

        /* Horas en línea */
        .time-row { display: flex; gap: 10px; }
        .time-row div { flex: 1; }

        .btn-save { 
            width: 100%; 
            background: var(--accent); 
            color: white; 
            border: none; 
            padding: 15px; 
            border-radius: 4px; 
            font-weight: bold; 
            text-transform: uppercase;
            font-family: var(--font-heading);
            letter-spacing: 1px;
            cursor: pointer; 
            transition: 0.3s; 
            margin-top: 10px;
        }
        .btn-save:hover { background: var(--accent-dark); transform: translateY(-1px); }

        /* --- TABLA DE TURNOS PREMIUM (Móvil Inteligente) --- */
        .table-section { background: var(--card); border-radius: 8px; border: 1px solid var(--border); overflow: hidden; }
        
        /* Contenedor con scroll para móvil */
        .table-responsive { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }

        table { width: 100%; border-collapse: collapse; min-width: 600px; /* Asegura que no se amontone en PC */ }
        th { 
            background: #1a1a1a; 
            color: white; 
            padding: 15px; 
            text-align: left; 
            text-transform: uppercase; 
            font-size: 0.7rem; 
            letter-spacing: 1px;
            font-family: var(--font-heading);
            border-bottom: 2px solid var(--border);
        }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 0.85rem; color: #ccc; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #181818; color: white; }

        /* Estado Pill */
        .status-pill { 
            background: rgba(46, 204, 113, 0.15); 
            color: #2ecc71; 
            padding: 4px 10px; 
            border-radius: 4px; 
            font-size: 0.65rem; 
            font-weight: bold; 
            text-transform: uppercase; 
            border: 1px solid rgba(46, 204, 113, 0.3);
        }

        /* Botones de acción en tabla */
        .action-cell { display: flex; gap: 8px; }
        .btn-table-ws { 
            background: #25d366; color: white; border: none; padding: 8px; border-radius: 4px; text-decoration: none; font-size: 0.9rem;
            width: 35px; height: 35px; display: flex; align-items: center; justify-content: center;
        }
        .btn-table-ws:hover { background: #1ebe5d; }

        .btn-table-delete { 
            background: #1a1a1a; border: 1px solid #333; color: #ff4444; padding: 8px; border-radius: 4px; cursor: pointer; font-size: 0.9rem;
            width: 35px; height: 35px; display: flex; align-items: center; justify-content: center;
        }
        .btn-table-delete:hover { background: #ff4444; color: white; border-color: #ff4444; }

        /* Mensaje Vacío */
        .no-datos { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .no-datos i { font-size: 2.5rem; color: #222; margin-bottom: 15px; display: block; }

        /* Lista de Bloqueos (Sidebar) */
        .bloqueos-list { margin-top: 20px; border-top: 1px solid var(--border); padding-top: 20px; max-height: 250px; overflow-y: auto; }
        .bloqueos-list p.title { font-size: 0.7rem; color: white; text-transform: uppercase; margin-bottom: 10px; font-family: var(--font-heading); letter-spacing: 1px; }
        
        .bloqueo-item { 
            display: flex; justify-content: space-between; align-items: center; 
            background: #0a0a0a; padding: 10px 12px; border-radius: 4px; margin-bottom: 6px; 
            font-size: 0.75rem; border: 1px solid var(--border); border-left: 3px solid var(--accent); 
        }
        .bloqueo-item strong { color: white; }
        .btn-mini-delete { background: none; border: none; color: #555; cursor: pointer; font-size: 1rem; padding: 0 5px; transition: 0.2s; }
        .btn-mini-delete:hover { color: #ff4444; }

        /* Scrollbar Premium */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #252525; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #333; }

    </style>
</head>
<body>
    <div class="admin-layout">
        <div class="admin-container">
            <header class="header-admin">
                <div class="logo-admin">
                    <h1>PANEL <span>KATANA</span></h1>
                    <p>Concordia, Entre Ríos</p>
                </div>
                    <div class="header-actions">
                        <div style="display: flex; align-items: center; gap: 10px; background: #000; padding: 5px 12px; border-radius: 4px; border: 1px solid var(--accent);">
                            <i class="fas fa-calendar-alt" style="color:var(--accent); font-size:0.8rem"></i>
                            <input type="text" id="filtro-fecha" placeholder="Hoy" style="background:transparent; border:none; color:var(--accent); font-family:var(--font-body); width:100px; outline:none; cursor:pointer;">
                        </div>
                        
                        <span id="contador" class="stats-badge">0 TURNOS</span>
<a href="javascript:void(0)" onclick="cerrarSesion()" class="btn-exit">
    <i class="fas fa-sign-out-alt"></i> SALIR
</a>                    </div>
            </header>

            <div class="admin-grid">
                <section class="table-section">
                    <div class="table-responsive">
                        <table id="contenedor-tabla">
                            <thead>
                                <tr>
                                    <th>Cliente</th>
                                    <th>Contacto</th>
                                    <th>Fecha y Hora</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="lista-turnos-admin">
                                </tbody>
                        </table>
                    </div>
                    <div id="mensaje-vacio" class="no-datos" style="display:none;">
                        <i class="fas fa-calendar-check"></i>
                        <span>La agenda está limpia por ahora.</span>
                    </div>
                </section>

                <aside>
                    <div class="config-card">
                        <h3><i class="fas fa-clock"></i> Horario de Atención</h3>
                        <form id="form-config">
                            <label style="font-size: 0.7rem; color: var(--accent); margin-bottom: 10px; display: block;">TURNO MAÑANA</label>
                            <div class="config-group time-row">
                                <div>
                                    <label>Apertura</label>
                                    <input type="time" id="m_apertura" value="09:00">
                                </div>
                                <div>
                                    <label>Cierre</label>
                                    <input type="time" id="m_cierre" value="12:00">
                                </div>
                            </div>

                            <label style="font-size: 0.7rem; color: var(--accent); margin-bottom: 10px; display: block; margin-top: 15px;">TURNO TARDE</label>
                            <div class="config-group time-row">
                                <div>
                                    <label>Apertura</label>
                                    <input type="time" id="t_apertura" value="16:00">
                                </div>
                                <div>
                                    <label>Cierre</label>
                                    <input type="time" id="t_cierre" value="20:00">
                                </div>
                            </div>

                            <div class="config-group">
                                <label>Intervalo de Turnos</label>
                                <select id="intervalo">
                                    <option value="30">Cada 30 min</option>
                                    <option value="45">Cada 45 min</option>
                                    <option value="60">Cada 1 hora</option>
                                </select>
                            </div>

                            <div class="config-group">
                                <label>Días de atención</label>
                                <div class="days-grid">
                                    <label class="day-item"><input type="checkbox" name="dias" value="1" checked> Lun</label>
                                    <label class="day-item"><input type="checkbox" name="dias" value="2" checked> Mar</label>
                                    <label class="day-item"><input type="checkbox" name="dias" value="3" checked> Mié</label>
                                    <label class="day-item"><input type="checkbox" name="dias" value="4" checked> Jue</label>
                                    <label class="day-item"><input type="checkbox" name="dias" value="5" checked> Vie</label>
                                    <label class="day-item"><input type="checkbox" name="dias" value="6" checked> Sáb</label>
                                    <label class="day-item"><input type="checkbox" name="dias" value="0"> Dom</label>
                                </div>
                            </div>
                            <button type="submit" class="btn-save">ACTUALIZAR BASE</button>
                        </form>
                    </div>

                    <div class="config-card" style="margin-top: 25px;">
                        <h3><i class="fas fa-user-slash"></i> Anular Fecha/Hora</h3>
                        <form id="form-bloqueo">
                            <div class="config-group">
                                <label>Fecha</label>
                                <input type="date" id="bloqueo-fecha" required>
                            </div>
                            <div class="config-group">
                                <label>Tipo de Anulación</label>
                                <select id="bloqueo-tipo" onchange="toggleBloqueoHoras()">
                                    <option value="todo">Todo el día (Franco)</option>
                                    <option value="parcial">Rango Horario (Siesta)</option>
                                </select>
                            </div>
                            
                            <div id="bloqueo-horas" style="display: none; gap: 10px; margin-bottom: 18px;">
                                <div style="flex: 1;">
                                    <label>Inicio</label>
                                    <input type="time" id="bloqueo-inicio">
                                </div>
                                <div style="flex: 1;">
                                    <label>Fin</label>
                                    <input type="time" id="bloqueo-fin">
                                </div>
                            </div>

                            <button type="submit" class="btn-save" style="background: #333;">BLOQUEAR</button>
                        </form>
                        
                        <div class="bloqueos-list">
                            <p class="title">Bloqueos Activos</p>
                            <div id="lista-bloqueos">
                                </div>
                        </div>
                    </div>
                </aside>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
    // 1. Inicializamos el calendario primero
    flatpickr("#filtro-fecha", {
        locale: "es",
        dateFormat: "d/m/Y",
        defaultDate: "today", // Para que al entrar ya muestre lo de hoy
        onChange: function(selectedDates, dateStr) {
            // Cada vez que el usuario cambie la fecha, se ejecuta esto:
            cargarAgenda(); 
        }
    });

    // 2. Corremos el resto de las funciones
    verificarSesion();
    cargarConfiguracion(); 
});

async function verificarSesion() {
    try {
        // 1. Le damos un mini respiro al navegador para procesar la cookie del login
        await new Promise(r => setTimeout(r, 150));

        // 2. Agregamos credentials: 'include' para obligar el envío de la cookie
        const res = await fetch('/api/admin/turnos', { 
            credentials: 'include' 
        });

        if (res.status === 401) {
            console.warn("No autorizado: Redirigiendo al login...");
            window.location.href = 'login.html';
            return;
        }

        // 3. Si llegamos acá, la sesión es válida. 
        // Primero inicializamos el calendario y luego cargamos los datos.
        inicializarCalendario(); 
        cargarAgenda();
        cargarBloqueos();
        cargarConfiguracion();

    } catch (error) { 
        console.error("Error en la verificación de sesión:", error);
        window.location.href = 'login.html';
    }
}

// Extraé la lógica del flatpickr a una función aparte para que sea más limpio
function inicializarCalendario() {
    if (document.getElementById('filtro-fecha')) {
        flatpickr("#filtro-fecha", {
            locale: "es",
            dateFormat: "d/m/Y",
            defaultDate: "today",
            onChange: function() {
                cargarAgenda();
            }
        });
    }
}
async function cargarAgenda() {
    try {
        const res = await fetch('/api/admin/turnos');
        const turnos = await res.json();
        const lista = document.getElementById('lista-turnos-admin');
        const contador = document.getElementById('contador');
        const tabla = document.getElementById('contenedor-tabla');
        const filtroFecha = document.getElementById('filtro-fecha').value; 

        lista.innerHTML = '';

        // 1. Filtrar los turnos por la fecha seleccionada
        const turnosFiltrados = turnos.filter(t => {
            if (!t.fecha_hora) return false;
            const soloFechaTurno = t.fecha_hora.split(' ')[0]; 
            return soloFechaTurno === filtroFecha;
        });

        // 2. Actualizar contador
        contador.innerText = `${turnosFiltrados.length} TURNOS`;

        // 3. Manejar visualización si no hay turnos
        if (turnosFiltrados.length === 0) {
            document.getElementById('mensaje-vacio').style.display = 'block';
            tabla.style.display = 'none';
            return;
        }

        document.getElementById('mensaje-vacio').style.display = 'none';
        tabla.style.display = 'table';

        // 4. Renderizar turnos filtrados
        turnosFiltrados.forEach(t => {
            const hora = t.fecha_hora.split(' ')[1]; // Extraemos "HH:mm"
            
            // Lógica de WhatsApp limpia
            const telLimpio = t.cliente_telefono.replace(/\D/g, '');
            const prefijo = telLimpio.startsWith('54') ? '' : '54'; 
            const linkWS = `https://wa.me/${prefijo}${telLimpio}`;
            
            lista.innerHTML += `
                <tr>
                    <td><strong>${t.cliente_nombre}</strong><br><span class="status-pill">Activo</span></td>
                    <td>
                        <a href="${linkWS}" target="_blank" class="btn-table-ws" style="background:#25d366; color:white; padding:8px 15px; border-radius:4px; text-decoration:none; display:flex; align-items:center; justify-content:center; gap:8px; width: fit-content;">
                            <i class="fab fa-whatsapp"></i> WhatsApp
                        </a>
                    </td>
                    <td style="font-weight: bold; color: var(--accent); font-size: 1.1rem;">${hora} hs</td>
                    <td class="action-cell">
                        <button class="btn-table-delete" onclick="eliminarTurno(${t.id})" style="width:40px; height:40px;">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </td>
                </tr>
            `;
        });

    } catch (e) { 
        console.error("Error cargando agenda:", e); 
    }
}
        async function eliminarTurno(id) {
            if(!confirm("¿Borrar turno?")) return;
            await fetch(`/api/admin/turnos/${id}`, { method: 'DELETE' });
            cargarAgenda();
        }

        // --- ACTUALIZACIÓN DE CONFIGURACIÓN ---
        document.getElementById('form-config').addEventListener('submit', async (e) => {
            e.preventDefault();
            const dias = Array.from(document.querySelectorAll('input[name="dias"]:checked')).map(cb => cb.value);
            
            const config = {
                m_apertura: document.getElementById('m_apertura').value,
                m_cierre: document.getElementById('m_cierre').value,
                t_apertura: document.getElementById('t_apertura').value,
                t_cierre: document.getElementById('t_cierre').value,
                intervalo: document.getElementById('intervalo').value,
                dias_laborales: dias.join(',')
            };

            const res = await fetch('/api/admin/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(config)
            });
            if(res.ok) alert("✅ Horarios actualizados");
        });

        // --- BLOQUEOS ---
        function toggleBloqueoHoras() {
            const tipo = document.getElementById('bloqueo-tipo').value;
            document.getElementById('bloqueo-horas').style.display = (tipo === 'parcial') ? 'flex' : 'none';
        }

        document.getElementById('form-bloqueo').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                fecha: document.getElementById('bloqueo-fecha').value,
                tipo: document.getElementById('bloqueo-tipo').value,
                inicio: document.getElementById('bloqueo-inicio').value || null,
                fin: document.getElementById('bloqueo-fin').value || null
            };
            await fetch('/api/admin/bloqueos', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            cargarBloqueos();
            e.target.reset();
        });

        async function cargarBloqueos() {
            const res = await fetch('/api/admin/bloqueos');
            const bloqueos = await res.json();
            const contenedor = document.getElementById('lista-bloqueos');
            contenedor.innerHTML = bloqueos.length ? '' : '<span style="font-size:0.7rem;">Sin bloqueos</span>';
            bloqueos.forEach(b => {
                const info = b.tipo === 'todo' ? 'Todo el día' : `${b.inicio} a ${b.fin}`;
                contenedor.innerHTML += `<div class="bloqueo-item"><span><b>${b.fecha}</b> - ${info}</span><button class="btn-mini-delete" onclick="eliminarBloqueo(${b.id})">×</button></div>`;
            });
        }

        async function eliminarBloqueo(id) {
            await fetch(`/api/admin/bloqueos/${id}`, { method: 'DELETE' });
            cargarBloqueos();
        }

        async function cargarConfiguracion() {
    try {
        const res = await fetch('/api/config');
        const data = await res.json();
        
        if (data) {
            // Usamos m_ y t_ para que coincida con tus inputs y evitar la "ñ"
            if (data.m_apertura) document.getElementById('m_apertura').value = data.m_apertura.slice(0, 5);
            if (data.m_cierre) document.getElementById('m_cierre').value = data.m_cierre.slice(0, 5);
            if (data.t_apertura) document.getElementById('t_apertura').value = data.t_apertura.slice(0, 5);
            if (data.t_cierre) document.getElementById('t_cierre').value = data.t_cierre.slice(0, 5);
            
            if (data.intervalo) {
                document.getElementById('intervalo').value = data.intervalo;
            }

            if (data.dias_laborales) {
                const dias = data.dias_laborales.split(',');
                document.querySelectorAll('input[name="dias"]').forEach(cb => {
                    cb.checked = dias.includes(cb.value);
                });
            }
        }
    } catch (error) {
        console.error("Error al cargar la configuración:", error);
    }
}
        async function cerrarSesion() {
    if (!confirm("¿Cerrar sesión de administrador?")) return;
    
    // Llamamos a una ruta de logout que deberías tener en tu index.js
    await fetch('/api/logout', { method: 'POST' });
    window.location.href = 'login.html';
}
    </script>
</body>
</html>
