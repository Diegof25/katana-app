<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login Admin | Katana</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="display: flex; align-items: center; justify-content: center; height: 100vh;">
    <div class="reserva-card" style="width: 400px;">
    <div class="reserva-header">
        <h2>ACCESO <span>ADMIN</span></h2>
    </div>
    <div class="form-body">
        <div class="input-box">
            <label>Nombre de Usuario</label>
            <input type="text" id="user" placeholder="Ej: admin_katana">
        </div>
        <div class="input-box">
            <label>Contraseña</label>
            <input type="password" id="pass" placeholder="••••••••">
        </div>
        <button onclick="intentarLogin()" class="btn-primary btn-block">ENTRAR</button>
        <p id="error" style="color: #ff4444; display: none; margin-top: 10px; font-size: 0.8rem; text-align: center;">Usuario o clave incorrectos</p>
    </div>
</div>

<script>
    async function intentarLogin() {
        const username = document.getElementById('user').value;
        const password = document.getElementById('pass').value;

        const res = await fetch('/api/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ username, password }) // Mandamos los dos datos
        });

        if (res.ok) {
            window.location.href = 'admin.html';
        } else {
            const data = await res.json();
            document.getElementById('error').innerText = data.message || "Error al entrar";
            document.getElementById('error').style.display = 'block';
        }
    }
</script>
</body>
</html>
